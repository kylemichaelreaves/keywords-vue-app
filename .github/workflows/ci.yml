name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml

  unit-test:
    runs-on: ubuntu-latest
    needs: code-quality
    env:
      VITE_APIGATEWAY_URL: 'https://api.example.com'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  e2e-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: code-quality
    env:
      VITE_TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      VITE_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Browser install (cache miss only). This is pinned to Node 22 via
      # setup-node above: under Node 24 (the current `lts/*`) Playwright 1.59.x
      # hangs indefinitely on "extracting archive" after the browser download
      # completes. NEEDRESTART_MODE / DEBIAN_FRONTEND keep the apt portion
      # non-interactive; the timeout is a backstop against a future hang.
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        env:
          NEEDRESTART_MODE: a
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      # Cache hit: browsers already present, so only the (fast, apt-only)
      # system dependencies are installed.
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 8
        env:
          NEEDRESTART_MODE: a
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install-deps chromium

      - name: Build application
        run: npm run build:ci
        env:
          VITE_EXPOSE_PINIA_FOR_E2E: 'true'

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 30
